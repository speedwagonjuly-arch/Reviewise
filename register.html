<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Reviewise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --page-bg: linear-gradient(135deg, #f5f7fa 0%, #e9eef5 100%);
            --surface: white;
            --text: #1f2a44;
            --muted: #666d7d;
            --accent: #0066ff;
            --accent-soft: rgba(0, 102, 255, 0.12);
            --card-shadow: 0 20px 60px rgba(0, 51, 102, 0.12);
            --btn-bg: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            --btn-text: white;
            --btn-secondary-bg: linear-gradient(135deg, #0080ff 0%, #0066cc 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--page-bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .container {
            background: var(--surface);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 16px;
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        .logo img {
            max-width: 60px;
            height: auto;
            filter: drop-shadow(0 4px 12px rgba(0, 102, 255, 0.2));
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .header h1 {
            color: #003366;
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #003366 0%, #0066ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666d7d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out both;
        }

        .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-group:nth-child(2) { animation-delay: 0.4s; }
        .form-group:nth-child(3) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            color: #003366;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e5eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
            background: white;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
            background: #fafbfc;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #999;
        }

        input[type="file"] {
            display: none;
        }

        .profile-upload {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .upload-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .upload-area {
            width: 100%;
            height: 100%;
            border: 2px dashed #0066ff;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #f0f6ff 0%, #f8fbff 100%);
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .upload-area:hover {
            border-color: #0052cc;
            background: #e8f1ff;
        }

        .upload-area.drag-over {
            border-color: #0052cc;
            background: #e8f1ff;
            transform: scale(1.05);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 4px;
        }

        .upload-text {
            color: #003366;
            font-weight: 600;
            font-size: 11px;
            text-align: center;
        }

        .change-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background-color: #0066ff;
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 102, 255, 0.25);
        }

        .change-icon:hover {
            background-color: #0052cc;
            transform: scale(1.1);
        }

        .preview-container {
            position: relative;
            width: 140px;
            height: 140px;
            display: none;
            margin: 0 auto;
        }

        .preview-container.show {
            display: block;
        }

        .preview-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0066ff;
            box-shadow: 0 4px 16px rgba(0, 102, 255, 0.15);
        }

        .change-icon-preview {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background-color: #0066ff;
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 102, 255, 0.25);
        }

        .change-icon-preview:hover {
            background-color: #0052cc;
            transform: scale(1.1);
        }

        .preview-info {
            text-align: center;
            color: #666d7d;
            font-size: 12px;
            margin-top: 12px;
            word-break: break-all;
        }

        .remove-pic-btn {
            background: none;
            border: none;
            color: #0066ff;
            cursor: pointer;
            font-size: 12px;
            text-decoration: underline;
            margin-top: 8px;
            transition: color 0.3s ease;
        }

        .remove-pic-btn:hover {
            color: #0052cc;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 8px 24px rgba(0, 128, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-register::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 128, 255, 0.45);
        }

        .btn-register:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register > span {
            position: relative;
            z-index: 1;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-link a {
            color: #0066ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            color: #0052cc;
            text-decoration: underline;
        }

        .login-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #666d7d;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .login-link a {
            color: #0066ff;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            text-decoration: underline;
            color: #0052cc;
        }
    </style>
    <link rel="stylesheet" href="ui-theme.css">
</head>
<body class="game-theme">
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="logo.png" alt="Reviewise Logo">
            </div>
            <h1>Create Account</h1>
            <p>Join Reviewise today</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Create a strong password"
                    required
                >
            </div>

            <div class="form-group">
                <label style="display: block; text-align: center; margin-bottom: 16px;">Profile Picture</label>
                <div class="profile-upload">
                    <div class="upload-wrapper" id="uploadWrapper">
                        <div class="upload-area" id="uploadArea">
                            <span class="upload-icon">📸</span>
                            <div class="upload-text">Click or drag</div>
                        </div>
                        <div class="change-icon" id="changeIcon">✎</div>
                    </div>
                    <div class="preview-container" id="previewContainer">
                        <div style="position: relative; width: 140px; height: 140px; margin: 0 auto;">
                            <img id="previewImage" class="preview-image" alt="Profile preview">
                            <div class="change-icon-preview" id="changeIconPreview">✎</div>
                        </div>
                        <div class="preview-info" id="fileName"></div>
                        <button type="button" class="remove-pic-btn" id="removeBtn">Remove photo</button>
                    </div>
                </div>
                <input 
                    type="file" 
                    id="profilePic" 
                    name="profile-pic" 
                    accept="image/*"
                >
            </div>

            <div id="errorMsg" style="color: #ff6b6b; text-align: center; margin-top: 12px; font-size: 13px; display: none;"></div>

            <button type="submit" class="btn-register"><span>Create Account</span></button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>

            <div class="back-link">
                <a href="start.html">← Back to Home</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');
            const uploadArea = document.getElementById('uploadArea');
            const profilePic = document.getElementById('profilePic');
            const previewContainer = document.getElementById('previewContainer');
            const previewImage = document.getElementById('previewImage');
            const fileName = document.getElementById('fileName');
            const removeBtn = document.getElementById('removeBtn');
            const changeIcon = document.getElementById('changeIcon');
            const changeIconPreview = document.getElementById('changeIconPreview');

            // Click to upload
            uploadArea.addEventListener('click', () => profilePic.click());
            changeIcon.addEventListener('click', () => profilePic.click());
            changeIconPreview.addEventListener('click', () => profilePic.click());

            // Drag and drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('drag-over');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('drag-over');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    profilePic.files = files;
                    handleFileSelect(files[0]);
                }
            });

            // File input change
            profilePic.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileSelect(e.target.files[0]);
                }
            });

            // Handle file selection with compression
            function handleFileSelect(file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('File size must be less than 5MB');
                    profilePic.value = '';
                    previewContainer.classList.remove('show');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    // Compress image before displaying
                    compressImage(e.target.result, (compressedImage) => {
                        previewImage.src = compressedImage;
                        fileName.textContent = file.name;
                        previewContainer.classList.add('show');
                        document.getElementById('uploadWrapper').style.display = 'none';
                    });
                };
                reader.readAsDataURL(file);
            }

            // Compress image using Canvas
            function compressImage(imageSource, callback) {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Set max dimensions
                    const MAX_WIDTH = 300;
                    const MAX_HEIGHT = 300;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // Export as compressed JPEG (quality 0.7 = 70%)
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = imageSource;
            }

            // Remove button
            removeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                profilePic.value = '';
                previewContainer.classList.remove('show');
                document.getElementById('uploadWrapper').style.display = 'block';
            });

            // Register form submission
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                // Validation
                if (!username || !password) {
                    errorMsg.textContent = 'Username and password are required';
                    errorMsg.style.display = 'block';
                    return;
                }

                if (username.length < 3) {
                    errorMsg.textContent = 'Username must be at least 3 characters';
                    errorMsg.style.display = 'block';
                    return;
                }

                if (password.length < 6) {
                    errorMsg.textContent = 'Password must be at least 6 characters';
                    errorMsg.style.display = 'block';
                    return;
                }

                // Check if username already exists
                const users = JSON.parse(localStorage.getItem('users')) || [];
                if (users.some(user => user.username === username)) {
                    errorMsg.textContent = 'Username already exists';
                    errorMsg.style.display = 'block';
                    return;
                }

                // Save new user
                const newUser = {
                    username: username,
                    password: password,
                    profilePic: previewImage.src || null,
                    quizPoints: 0,
                    questionStats: {}
                };

                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));

                // Clear form
                registerForm.reset();
                previewContainer.classList.remove('show');
                document.getElementById('uploadWrapper').style.display = 'block';
                errorMsg.style.display = 'none';

                // Show success message
                alert('Account created successfully! You can now login.');
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
